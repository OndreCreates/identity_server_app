<!DOCTYPE html>
<html lang="cs" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Přihlášení – Identity Server</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: radial-gradient(circle at top, #1c2333 0%, #0b0e14 65%);
            color: #e6e8ec;
        }

        .card {
            width: 100%;
            max-width: 380px;
            padding: 40px 36px;
            border-radius: 16px;
            background: #131824;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
        }

        .brand {
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #6d7690;
            margin-bottom: 8px;
        }

        h1 {
            font-size: 22px;
            font-weight: 600;
            margin: 0 0 28px;
            color: #f4f5f7;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #9aa2b6;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 11px 13px;
            margin-bottom: 18px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: #0d111a;
            color: #f4f5f7;
            font-size: 14px;
        }

        input:focus {
            outline: none;
            border-color: #5b7cfa;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #5b7cfa;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        button:hover {
            background: #4b6bf0;
        }

        .error {
            background: rgba(224, 70, 82, 0.12);
            border: 1px solid rgba(224, 70, 82, 0.35);
            color: #ff8c96;
            font-size: 13px;
            padding: 10px 12px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="brand">OndreCreates · Identity Server</div>
        <h1>Přihlaste se ke svému účtu</h1>

        <div class="error" th:if="${param.error}">
            Nesprávný email nebo heslo.
        </div>

        <form th:action="@{/login}" method="post">
            <label for="username">Email</label>
            <input type="email" id="username" name="username" autocomplete="username" required autofocus>

            <label for="password">Heslo</label>
            <input type="password" id="password" name="password" autocomplete="current-password" required>

            <button type="submit">Přihlásit se</button>
        </form>
    </div>
</body>
</html>
