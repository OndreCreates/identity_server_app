server:
  port: 9000

spring:
  application:
    name: identity-server

  datasource:
    url: jdbc:mysql://localhost:3306/${DB_NAME:identity_server}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USER:identity_app}
    password: ${DB_PASSWORD:changeme}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  demo-client:
    secret: ${DEMO_CLIENT_SECRET:demo-client-dev-secret-change-me}
  mfa:
    # Base64-encoded 256-bit AES key. Dev-only default -- generate a real one per environment.
    encryption-key: ${MFA_ENCRYPTION_KEY:clbLPsWb+rlRiazzQY/Sf50oVPAxu7Co3/JimoQEkQY=}
