server:
  port: 9000

spring:
  application:
    name: identity-server

  datasource:
    url: jdbc:mysql://localhost:3306/${DB_NAME:identity_server}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USER:identity_app}
    password: ${DB_PASSWORD:changeme}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  # Baked into every issued token's `iss` claim and used to build the JWKS/discovery URLs --
  # must be the address clients and browsers actually reach this server at.
  issuer: ${APP_ISSUER:http://localhost:9000}
  demo-client:
    secret: ${DEMO_CLIENT_SECRET:demo-client-dev-secret-change-me}
    redirect-uri: ${DEMO_CLIENT_REDIRECT_URI:http://localhost:3000/callback}
  incident-admin-panel:
    # Consumed by incident_management_app's Next.js admin panel (separate portfolio project,
    # separate registered client -- see ClientConfig).
    secret: ${INCIDENT_ADMIN_CLIENT_SECRET:incident-admin-dev-secret-change-me}
    redirect-uri: ${INCIDENT_ADMIN_REDIRECT_URI:http://localhost:3001/callback}
  mfa:
    # Base64-encoded 256-bit AES key. Dev-only default -- generate a real one per environment.
    encryption-key: ${MFA_ENCRYPTION_KEY:clbLPsWb+rlRiazzQY/Sf50oVPAxu7Co3/JimoQEkQY=}
  jwk:
    # Encrypts the persisted JWT signing key at rest (JwkKeyService) -- deliberately a
    # separate key from app.mfa.encryption-key, not shared, so one leaking doesn't also
    # compromise the other.
    encryption-key: ${JWK_ENCRYPTION_KEY:4m+/7jXHa03CVWIH9VSKlXzerznmaJ76sGOuPJtuoaw=}
