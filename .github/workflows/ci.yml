name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend (build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      # Tests use Testcontainers (a real MySQL in a throwaway container), not a service
      # container or the docker-compose stack -- Docker is already available on this runner.
      - name: Build and test
        run: mvn -B verify

  frontend:
    name: Demo client (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: demo-client
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: demo-client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      # Build-time env values only -- Next.js needs these set to trace the standalone build,
      # nothing here is a real secret or reachable outside this CI job.
      - name: Build
        env:
          IDENTITY_SERVER_ISSUER: http://localhost:9000
          OAUTH_CLIENT_ID: demo-client
          OAUTH_CLIENT_SECRET: ci-build-placeholder
          OAUTH_REDIRECT_URI: http://localhost:3000/callback
        run: npm run build
